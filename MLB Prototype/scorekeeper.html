<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Ballparks Quest · Scorekeeper</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0F1F38">
<style>
/* ═══════════════════════════════════════════
   SCOREKEEPER · CENTERPIECE LAYOUT
   The grid is the hero. Everything serves it.
═══════════════════════════════════════════ */

@font-face {
  font-family: 'Playfair Display';
  font-style: normal;
  font-weight: 700;
  font-display: swap;
  src: url('fonts/playfair-display-700.woff2') format('woff2');
}

@font-face {
  font-family: 'Playfair Display';
  font-style: italic;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/playfair-display-italic-400.woff2') format('woff2');
}

@font-face {
  font-family: 'DM Mono';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/dm-mono-400.woff2') format('woff2');
}

@font-face {
  font-family: 'DM Mono';
  font-style: normal;
  font-weight: 500;
  font-display: swap;
  src: url('fonts/dm-mono-500.woff2') format('woff2');
}

@font-face {
  font-family: 'DM Sans';
  font-style: normal;
  font-weight: 300;
  font-display: swap;
  src: url('fonts/dm-sans-300.woff2') format('woff2');
}

@font-face {
  font-family: 'DM Sans';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/dm-sans-400.woff2') format('woff2');
}

@font-face {
  font-family: 'DM Sans';
  font-style: normal;
  font-weight: 500;
  font-display: swap;
  src: url('fonts/dm-sans-500.woff2') format('woff2');
}

@font-face {
  font-family: 'Special Elite';
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url('fonts/special-elite-400.woff2') format('woff2');
}

:root {
  /* Page */
  --bg:            #1C1A14;
  --bg-mid:        #232118;

  /* Scorecard */
  --sc-cream:      #FBF6E9;
  --sc-pebble:     #F0E8D4;
  --sc-line:       #C9BA9B;
  --sc-ink:        #1C1108;
  --sc-ink-faded:  #6B5D44;
  --sc-pencil:     #2A4A8A;
  --sc-red:        #B03030;
  --sc-gold:       #C8920A;

  /* Phillies default theme — overridden per team */
  --team-primary:  #E81828;
  --team-secondary:#002D72;
  --team-name:     "Phillies";

  /* Cell */
  --cell-size:     92px;
  --lineup-w:      172px;
  --totals-w:      58px;

  /* Fonts */
  --f-score:  'Special Elite', cursive;
  --f-display:'Playfair Display', serif;
  --f-mono:   'DM Mono', monospace;
  --f-body:   'DM Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }

body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--sc-cream);
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ─── Layout shell ──────────────────────── */
/* desktop: [card | notes-panel]
             [input-bar            ]
   ipad:   [card full-width]
             [input-drawer]
             notes = slide-in
   mobile: single column scroll
*/

.sk-nav {
  background: rgba(28,26,20,0.97);
  border-bottom: 1px solid rgba(200,168,100,0.15);
  padding: 0 16px;
  height: 48px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  z-index: 50;
}

.sk-nav-back {
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(245,237,216,0.45);
  text-decoration: none;
  transition: color 140ms;
}
.sk-nav-back:hover { color: rgba(245,237,216,0.8); }

.sk-nav-sep { color: rgba(245,237,216,0.2); font-size: 12px; }

.sk-nav-title {
  font-family: var(--f-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--sc-cream);
  letter-spacing: -0.01em;
  flex: 1;
}

.sk-nav-venue {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--sc-gold);
  letter-spacing: 0.06em;
}

.sk-nav-actions {
  display: flex;
  gap: 6px;
  margin-left: auto;
}

.sk-btn {
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid rgba(200,168,100,0.2);
  background: transparent;
  color: rgba(245,237,216,0.55);
  transition: all 140ms;
}
.sk-btn:hover { color: var(--sc-cream); border-color: rgba(200,168,100,0.4); background: rgba(255,255,255,0.04); }
.sk-btn-amber {
  border-color: rgba(200,146,10,0.32);
  color: rgba(240,184,67,0.88);
  background: rgba(200,146,10,0.08);
}
.sk-btn-amber:hover {
  border-color: rgba(240,184,67,0.5);
  background: rgba(200,146,10,0.14);
}
.sk-btn-green {
  border-color: rgba(46,125,82,0.38);
  color: #8ACA8A;
  background: rgba(46,125,82,0.1);
}
.sk-btn-green:hover {
  border-color: rgba(138,202,138,0.55);
  background: rgba(46,125,82,0.16);
}
.sk-btn-red {
  border-color: rgba(184,48,48,0.36);
  color: #E08080;
  background: rgba(176,48,48,0.09);
}
.sk-btn-red:hover { color: #F1A4A4; border-color: #B03030; background: rgba(176,48,48,0.16); }

/* ─── Main area ─────────────────────────── */
.sk-main {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* ─── Scorecard column ──────────────────── */
.sk-card-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

/* ─── Notes panel ───────────────────────── */
.sk-notes-panel {
  width: 220px;
  flex-shrink: 0;
  background: #16140F;
  border-left: 1px solid rgba(200,168,100,0.12);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sk-notes-header {
  padding: 12px 14px 10px;
  border-bottom: 1px solid rgba(200,168,100,0.1);
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.5);
}

.sk-notes-feed {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.sk-note-entry {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sk-note-inning {
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  color: rgba(200,168,100,0.5);
}

.sk-note-text {
  font-family: var(--f-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--sc-cream);
  line-height: 1.25;
  letter-spacing: -0.01em;
}

.sk-note-text.red { color: #E05050; }
.sk-note-text.gold { color: var(--sc-gold); }

.sk-notes-input-area {
  padding: 10px 14px;
  border-top: 1px solid rgba(200,168,100,0.1);
  display: flex;
  gap: 6px;
}

.sk-notes-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,168,100,0.15);
  border-radius: 4px;
  color: var(--sc-cream);
  font-family: var(--f-mono);
  font-size: 10px;
  padding: 6px 8px;
  outline: none;
}

.sk-notes-input:focus { border-color: rgba(200,168,100,0.35); }
.sk-notes-input::placeholder { color: rgba(200,168,100,0.25); }

/* ─── Linescore strip ───────────────────── */
.sk-linescore-wrap {
  background: var(--bg-mid);
  border-bottom: 2px solid rgba(200,168,100,0.15);
  padding: 0 8px;
  flex-shrink: 0;
  overflow-x: auto;
}

.sk-linescore {
  border-collapse: collapse;
  min-width: 100%;
}

.sk-linescore th, .sk-linescore td {
  font-family: var(--f-mono);
  font-size: 11px;
  text-align: center;
  padding: 6px 8px;
  border-right: 1px solid rgba(200,168,100,0.1);
  min-width: 28px;
  white-space: nowrap;
}

.sk-linescore th:last-child, .sk-linescore td:last-child { border-right: none; }

.sk-linescore thead th {
  color: rgba(200,168,100,0.45);
  font-size: 9px;
  letter-spacing: 0.12em;
  border-bottom: 1px solid rgba(200,168,100,0.1);
}

.sk-linescore .ls-team {
  text-align: left;
  padding-left: 12px;
  font-family: var(--f-display);
  font-size: 12px;
  font-weight: 700;
  min-width: 90px;
  border-right: 1px solid rgba(200,168,100,0.2) !important;
}

.sk-linescore .ls-rhe {
  border-left: 1px solid rgba(200,168,100,0.2) !important;
  font-weight: 500;
}

.ls-away-row td { color: #7EB4E0; }
.ls-home-row td { color: var(--sc-cream); }
.ls-away-row .ls-team,
.ls-home-row .ls-team { color: var(--sc-cream); }

/* ─── Outs + status bar ─────────────────── */
.sk-status-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 6px 12px;
  background: rgba(0,0,0,0.2);
  border-bottom: 1px solid rgba(200,168,100,0.08);
  flex-shrink: 0;
}

.sk-outs-label {
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.4);
}

.sk-out-pip {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1.5px solid rgba(200,168,100,0.35);
  background: transparent;
  transition: background 140ms, border-color 140ms;
}

.sk-out-pip.filled {
  background: var(--sc-cream);
  border-color: var(--sc-cream);
}

.sk-batter-info {
  margin-left: 8px;
  font-family: var(--f-mono);
  font-size: 10px;
  color: #7EB4E0;
  letter-spacing: 0.06em;
}

.sk-inning-info {
  margin-left: auto;
  font-family: var(--f-display);
  font-size: 12px;
  font-style: italic;
  color: rgba(200,168,100,0.6);
}

.sk-side-tabs {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 10px;
  padding: 3px;
  border: 1px solid rgba(200,168,100,0.22);
  border-radius: 999px;
  background: rgba(255,255,255,0.05);
}

.sk-side-tab {
  border: none;
  background: transparent;
  color: rgba(245,237,216,0.74);
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 999px;
  padding: 6px 12px;
  cursor: pointer;
  transition: background 120ms, color 120ms, box-shadow 120ms;
}

.sk-side-tab:hover {
  color: var(--sc-cream);
}

.sk-side-tab.is-viewing {
  background: rgba(245,237,216,0.14);
  color: var(--sc-cream);
}

.sk-side-tab.is-batting {
  background: rgba(42,74,138,0.34);
  box-shadow: inset 0 0 0 1px rgba(126,180,224,0.68);
  color: #D8E8F8;
}

.sk-view-info {
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.42);
  margin-left: 4px;
}

/* ─── Diamond grid ──────────────────────── */
.sk-grid-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

.sk-grid-wrap {
  display: flex;
  min-width: max-content;
}

/* Lineup spine */
.sk-lineup-col {
  flex-shrink: 0;
  width: var(--lineup-w);
  border-right: 2px solid rgba(200,168,100,0.25);
  position: sticky;
  left: 0;
  z-index: 10;
  background: #1C1A14;
}

.sk-lineup-head {
  height: 30px;
  background: #16140F;
  border-bottom: 2px solid rgba(200,168,100,0.25);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.35);
}

.sk-lineup-cell {
  height: var(--cell-size);
  border-bottom: 1px solid rgba(200,168,100,0.1);
  display: flex;
  align-items: center;
  padding: 0 8px 0 10px;
  gap: 8px;
  transition: background 140ms;
}

.sk-lineup-cell.active-batter {
  background: rgba(42,74,138,0.15);
}

.sk-bat-num {
  font-family: var(--f-score);
  font-size: 16px;
  color: rgba(200,168,100,0.25);
  width: 16px;
  flex-shrink: 0;
  text-align: center;
}

.sk-bat-pos {
  font-family: var(--f-mono);
  font-size: 8px;
  color: rgba(200,168,100,0.4);
  border: 1px solid rgba(200,168,100,0.2);
  border-radius: 2px;
  padding: 1px 4px;
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}

.sk-bat-name {
  font-family: var(--f-display);
  font-size: 12px;
  font-weight: 700;
  color: var(--sc-cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.01em;
}

/* Inning columns */
.sk-innings-area {
  display: flex;
}

.sk-inning-col {
  flex-shrink: 0;
  border-right: 1px solid rgba(200,168,100,0.08);
}

.sk-inning-col.break-3, .sk-inning-col.break-6 {
  border-right: 1px solid rgba(200,168,100,0.2);
}

.sk-inning-head {
  height: 30px;
  background: #16140F;
  border-bottom: 2px solid rgba(200,168,100,0.25);
  width: var(--cell-size);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-score);
  font-size: 14px;
  color: rgba(200,168,100,0.6);
}

/* ─── THE DIAMOND CELL ──────────────────── */
.sk-diamond-cell {
  width: var(--cell-size);
  height: var(--cell-size);
  border-bottom: 1px solid rgba(200,168,100,0.08);
  position: relative;
  cursor: pointer;
  transition: background 100ms;
}

.sk-diamond-cell:hover { background: rgba(42,74,138,0.08); }
.sk-diamond-cell.active-cell { background: rgba(42,74,138,0.14); }

.sk-diamond-cell svg {
  display: block;
  width: 100%;
  height: 100%;
}

/* Corner annotations */
.cell-out-circle {
  position: absolute;
  top: 4px; right: 5px;
  font-family: var(--f-mono);
  font-size: 8px;
  width: 13px; height: 13px;
  border: 1px solid rgba(200,168,100,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(200,168,100,0.5);
  line-height: 1;
}

.cell-out-circle.filled {
  background: rgba(200,168,100,0.6);
  color: #1C1A14;
  border-color: transparent;
}

.cell-code-label {
  position: absolute;
  top: 4px; left: 4px;
  font-family: var(--f-mono);
  font-size: 9px;
  font-weight: 500;
  line-height: 1.2;
  pointer-events: none;
}

.cell-count-dots {
  position: absolute;
  bottom: 3px; left: 4px;
  display: flex; flex-direction: column; gap: 2px;
}

.count-dot-row { display: flex; gap: 2px; }

.count-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
}

.count-dot.ball   { background: #7EB4E0; opacity: 0.7; }
.count-dot.strike { background: #E05050; opacity: 0.7; }

/* Totals column */
.sk-totals-col {
  flex-shrink: 0;
  width: var(--totals-w);
  border-left: 2px solid rgba(200,168,100,0.25);
  position: sticky;
  right: 0;
  background: #1C1A14;
  z-index: 10;
}

.sk-totals-head {
  height: 30px;
  background: #16140F;
  border-bottom: 2px solid rgba(200,168,100,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.35);
}

.sk-totals-cell {
  height: var(--cell-size);
  border-bottom: 1px solid rgba(200,168,100,0.08);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.totals-ab {
  font-family: var(--f-mono);
  font-size: 10px;
  color: rgba(200,168,100,0.4);
}

.totals-h {
  font-family: var(--f-score);
  font-size: 18px;
  color: var(--sc-cream);
}

/* ─── Input bar (desktop bottom) ────────── */
.sk-input-bar {
  background: #16140F;
  border-top: 2px solid rgba(200,168,100,0.15);
  padding: 10px 14px;
  flex-shrink: 0;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.sk-input-section { display: flex; flex-direction: column; gap: 5px; }

.sk-input-label {
  font-family: var(--f-mono);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.4);
}

.sk-chip-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.sk-chip {
  font-family: var(--f-score);
  font-size: 11px;
  padding: 4px 9px;
  border-radius: 3px;
  border: 1px solid rgba(200,168,100,0.15);
  background: rgba(255,255,255,0.03);
  color: rgba(245,237,216,0.82);
  cursor: pointer;
  transition: all 120ms;
}

.sk-chip:hover { border-color: rgba(200,168,100,0.4); color: var(--sc-cream); background: rgba(255,255,255,0.06); }
.sk-chip.selected { background: rgba(42,74,138,0.48); border-color: #7EB4E0; color: #D8E8F8; }
.sk-chip.hit-chip:hover, .sk-chip.hit-chip.selected { border-color: #4B8750; background: rgba(40,90,40,0.28); color: #A6E0AA; }
.sk-chip.err-chip:hover, .sk-chip.err-chip.selected { border-color: var(--sc-red); background: rgba(176,48,48,0.22); color: #F1A4A4; }

.sk-code-input {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,168,100,0.18);
  border-radius: 4px;
  color: var(--sc-cream);
  font-family: var(--f-mono);
  font-size: 13px;
  padding: 7px 10px;
  width: 90px;
  outline: none;
  letter-spacing: 0.06em;
}

.sk-code-input:focus { border-color: rgba(200,168,100,0.45); }
.sk-code-input::placeholder { color: rgba(200,168,100,0.2); }

.sk-count-input {
  width: 58px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(200,168,100,0.18);
  border-radius: 4px;
  color: var(--sc-cream);
  font-family: var(--f-mono);
  font-size: 12px;
  padding: 7px 8px;
  outline: none;
}
.sk-count-input:focus { border-color: rgba(200,168,100,0.45); }
.sk-count-input::placeholder { color: rgba(200,168,100,0.2); }

.sk-log-btn {
  background: rgba(200,48,42,0.82);
  border: 1px solid rgba(241,164,164,0.28);
  border-radius: 4px;
  color: #FCEAE8;
  font-family: var(--f-score);
  font-size: 13px;
  padding: 8px 18px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 120ms;
  white-space: nowrap;
  align-self: flex-end;
}
.sk-log-btn:hover { background: rgba(212,59,49,0.92); border-color: rgba(241,164,164,0.44); }

/* ─── iPad layout overrides ─────────────── */
[data-layout="ipad"] .sk-notes-panel {
  position: fixed;
  right: -220px;
  top: 48px;
  bottom: 0;
  z-index: 40;
  transition: right 300ms cubic-bezier(0.25,0.46,0.45,0.94);
  box-shadow: -4px 0 24px rgba(0,0,0,0.4);
}

[data-layout="ipad"] .sk-notes-panel.open { right: 0; }

[data-layout="ipad"] .sk-card-col { flex: 1; }

/* Pencil mode indicator */
[data-input="pen"] .sk-nav-title::after {
  content: ' · ✏';
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--sc-gold);
  opacity: 0.7;
}

/* ─── Mobile (JS-driven layout attr) ──── */
[data-layout="mobile"] body { overflow: auto; }
[data-layout="mobile"] .sk-main { flex-direction: column; overflow: visible; }
[data-layout="mobile"] .sk-notes-panel { width: 100%; border-left: none; border-top: 1px solid rgba(200,168,100,0.12); }

<script>
/* ═══════════════════════════════════════════
   SCOREKEEPER ENGINE
═══════════════════════════════════════════ */
'use strict';

const app = window.BPQ && window.BPQ.app;
const utils = window.BPQ && window.BPQ.utils;
const SESSION_KEY = 'bpq_scorekeeper_session_v1';
const INNINGS = 9;
const BATTERS = 9;
const POSITIONS = ['CF','SS','1B','LF','DH','3B','RF','C','2B'];
const NAMES = ['Stott','Schwarber','Harper','Castellanos','Realmuto','Bohm','Sosa','Marsh','Turner'];

const HIT_CODES   = new Set(['1B','2B','3B','HR']);
const REACH_CODES = new Set(['BB','HBP','FC']);
const OUT_RE      = /^(K|Ʞ|[FLUNG]\d|[1-9]-[1-9](-[1-9])*|DP.*)$/;
const ERR_RE      = /^E\d/;

function isOut(c)  { return OUT_RE.test(c) || /^\d+-\d+/.test(c) || /^F\d/.test(c); }
function isHit(c)  { return HIT_CODES.has(c); }
function isErr(c)  { return ERR_RE.test(c); }
function clone(value) { return JSON.parse(JSON.stringify(value)); }
function escapeHtml(value) {
  return utils && utils.escapeHtml ? utils.escapeHtml(value) : String(value == null ? '' : value);
}

function emptyPlays() {
  return {
    away: Array.from({ length: BATTERS }, () => Array(INNINGS).fill(null)),
    home: Array.from({ length: BATTERS }, () => Array(INNINGS).fill(null))
  };
}

function emptyTotals() {
  return {
    away: Array.from({ length: BATTERS }, () => ({ ab: 0, h: 0 })),
    home: Array.from({ length: BATTERS }, () => ({ ab: 0, h: 0 }))
  };
}

function emptyLinescore() {
  return {
    away: { r: 0, h: 0, e: 0, inn: Array(INNINGS).fill(null) },
    home: { r: 0, h: 0, e: 0, inn: Array(INNINGS).fill(null) }
  };
}

function getInitialMeta() {
  const context = app && app.getScorekeeperContext ? app.getScorekeeperContext() : null;
  return {
    title: context ? `${context.homeTeam} scorebook` : 'New Game',
    venue: context ? context.venue : '',
    parkId: context ? context.parkId : '',
    awayName: 'Away',
    homeName: context ? context.homeTeam : 'Home'
  };
}

let meta = getInitialMeta();
let plays = emptyPlays();
let totals = emptyTotals();
let ls = emptyLinescore();
let notes = [];
let currentSide = 'away';
let viewSide = 'away';
let curInning = 0;
let outsThisHalf = 0;
let batterIndex = { away: 0, home: 0 };
let undoStack = [];

const ordinals = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th'];

function totalLoggedPlays() {
  return ['away', 'home'].reduce((sum, side) => sum + plays[side].flat().filter(Boolean).length, 0);
}

function getCurrentBatter() {
  return batterIndex[currentSide];
}

function captureSession() {
  return {
    version: 1,
    meta: clone(meta),
    plays: clone(plays),
    totals: clone(totals),
    ls: clone(ls),
    notes: clone(notes),
    currentSide,
    viewSide,
    curInning,
    outsThisHalf,
    batterIndex: clone(batterIndex)
  };
}

function updateMetaLabels() {
  document.getElementById('sk-game-title').textContent = meta.title || 'New Game';
  document.getElementById('sk-venue-label').textContent = meta.venue || '';
  document.getElementById('ls-away-name').textContent = meta.awayName || 'Away';
  document.getElementById('ls-home-name').textContent = meta.homeName || 'Home';
}

function saveSession() {
  localStorage.setItem(SESSION_KEY, JSON.stringify(captureSession()));
}

function pushUndo() {
  undoStack.push(captureSession());
  if (undoStack.length > 30) undoStack.shift();
}

function restoreSession(snapshot) {
  if (!snapshot) return;
  meta = snapshot.meta || getInitialMeta();
  plays = snapshot.plays || emptyPlays();
  totals = snapshot.totals || emptyTotals();
  ls = snapshot.ls || emptyLinescore();
  notes = Array.isArray(snapshot.notes) ? snapshot.notes : [];
  currentSide = snapshot.currentSide || 'away';
  viewSide = snapshot.viewSide || snapshot.currentSide || 'away';
  curInning = Number.isFinite(snapshot.curInning) ? snapshot.curInning : 0;
  outsThisHalf = Number.isFinite(snapshot.outsThisHalf) ? snapshot.outsThisHalf : 0;
  batterIndex = snapshot.batterIndex || { away: 0, home: 0 };
  renderAll();
}

function applyContextToSession(force) {
  const context = app && app.getScorekeeperContext ? app.getScorekeeperContext() : null;
  if (!context) return;
  const sessionIsEmpty = totalLoggedPlays() === 0 && notes.length === 0;
  if (force || sessionIsEmpty) {
    meta.venue = context.venue || meta.venue;
    meta.parkId = context.parkId || meta.parkId;
    meta.homeName = context.homeTeam || meta.homeName;
    if (!meta.title || meta.title === 'New Game') meta.title = `${meta.homeName} scorebook`;
    updateMetaLabels();
    saveSession();
  }
  if (!viewSide) viewSide = currentSide;
  if (app && app.clearScorekeeperContext) app.clearScorekeeperContext();
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (raw) restoreSession(JSON.parse(raw));
    applyContextToSession(!raw);
  } catch (error) {
    applyContextToSession(true);
  }
}

function buildGrid() {
  const lineupEl = document.getElementById('lineup-cells');
  lineupEl.innerHTML = '';
  for (let b = 0; b < BATTERS; b++) {
    const c = document.createElement('div');
    c.className = 'sk-lineup-cell';
    c.id = `lc-${b}`;
    c.innerHTML = `
      <span class="sk-bat-num">${b + 1}</span>
      <span class="sk-bat-pos">${POSITIONS[b]}</span>
      <span class="sk-bat-name"></span>`;
    lineupEl.appendChild(c);
  }

  const innEl = document.getElementById('innings-area');
  innEl.innerHTML = '';
  for (let i = 0; i < INNINGS; i++) {
    const col = document.createElement('div');
    col.className = 'sk-inning-col' + ([2, 5].includes(i) ? ' break-' + ([2, 5].indexOf(i) === 0 ? 3 : 6) : '');
    col.innerHTML = `<div class="sk-inning-head">${i + 1}</div>`;
    for (let b = 0; b < BATTERS; b++) {
      const cell = document.createElement('div');
      cell.className = 'sk-diamond-cell';
      cell.id = `cell-${b}-${i}`;
      cell.innerHTML = renderDiamond(null);
      cell.addEventListener('click', () => {
        if (viewSide !== currentSide) return;
        batterIndex[currentSide] = b;
        curInning = i;
        refreshActive();
      });
      col.appendChild(cell);
    }
    innEl.appendChild(col);
  }

  const totEl = document.getElementById('totals-cells');
  totEl.innerHTML = '';
  for (let b = 0; b < BATTERS; b++) {
    const c = document.createElement('div');
    c.className = 'sk-totals-cell';
    c.id = `tot-${b}`;
    c.innerHTML = `<span class="totals-ab">0</span><span class="totals-h">0</span>`;
    totEl.appendChild(c);
  }
}

const DP = { t:[44,12], r:[76,44], b:[44,76], l:[12,44] };
const pt = (p) => `${p[0]},${p[1]}`;

const BASE_PATHS = {
  '1B' : `M${pt(DP.b)} L${pt(DP.r)}`,
  '2B' : `M${pt(DP.b)} L${pt(DP.r)} L${pt(DP.t)}`,
  '3B' : `M${pt(DP.b)} L${pt(DP.r)} L${pt(DP.t)} L${pt(DP.l)}`,
  'HR' : `M${pt(DP.b)} L${pt(DP.r)} L${pt(DP.t)} L${pt(DP.l)} Z`,
  'BB' : `M${pt(DP.b)} L${pt(DP.r)}`,
  'HBP': `M${pt(DP.b)} L${pt(DP.r)}`,
  'FC' : `M${pt(DP.b)} L${pt(DP.r)}`
};

function renderDiamond(play, isActive) {
  const outline = `<path d="M${pt(DP.t)} L${pt(DP.r)} L${pt(DP.b)} L${pt(DP.l)} Z" fill="none" stroke="#C9BA9B" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.35"/>`;
  const activeRing = isActive && !play
    ? `<path d="M${pt(DP.t)} L${pt(DP.r)} L${pt(DP.b)} L${pt(DP.l)} Z" fill="none" stroke="#7EB4E0" stroke-width="1.5" opacity="0.4"/>`
    : '';
  if (!play) return `<svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">${outline}${activeRing}</svg>`;

  const { code, count, outNum, isLastOut } = play;
  const err = isErr(code);
  const hit = isHit(code);
  const hr = code === 'HR';
  const out = isOut(code);
  const color = err ? '#C85050' : hit ? '#7EB4E0' : out ? '#A89878' : '#7EB4E0';

  let pathEl = '';
  if (BASE_PATHS[code]) {
    const filled = hr ? `fill="${color}" fill-opacity="0.18"` : 'fill="none"';
    pathEl = `<path d="${BASE_PATHS[code]}" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" ${filled}/>`;
  }

  const codeColor = err ? '#C85050' : hit ? '#8AC4E8' : '#A89878';
  const codeEl = `<text x="5" y="12" font-family="'DM Mono',monospace" font-size="9" fill="${codeColor}" font-weight="500">${escapeHtml(code)}</text>`;

  let outEl = '';
  if (outNum) {
    outEl = `<circle cx="75" cy="11" r="7" fill="#A89878" opacity="0.65"/><text x="75" y="15" text-anchor="middle" font-family="'DM Mono',monospace" font-size="9" fill="#1C1A14">${outNum}</text>`;
  }

  let countEl = '';
  if (count && count.includes('-')) {
    const [balls, strikes] = count.split('-').map(Number);
    const bd = Array.from({ length: Math.min(balls, 4) }, (_, i) => `<circle cx="${4 + i * 5}" cy="79" r="1.8" fill="#7EB4E0" opacity="0.6"/>`).join('');
    const sd = Array.from({ length: Math.min(strikes, 3) }, (_, i) => `<circle cx="${4 + i * 5}" cy="84" r="1.8" fill="#C85050" opacity="0.6"/>`).join('');
    countEl = bd + sd;
  }

  const slash = isLastOut ? `<line x1="60" y1="62" x2="88" y2="88" stroke="#A89878" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>` : '';

  return `<svg viewBox="0 0 88 88" xmlns="http://www.w3.org/2000/svg">${outline}${pathEl}${codeEl}${outEl}${countEl}${slash}</svg>`;
}

function updateTotalsCell(batter) {
  const el = document.getElementById(`tot-${batter}`);
  if (el) el.innerHTML = `<span class="totals-ab">${totals[viewSide][batter].ab}</span><span class="totals-h">${totals[viewSide][batter].h}</span>`;
}

function renderVisibleScorecard() {
  for (let batter = 0; batter < BATTERS; batter++) {
    const row = document.getElementById(`lc-${batter}`);
    if (row) {
      const name = row.querySelector('.sk-bat-name');
      if (name) name.textContent = NAMES[batter];
    }
    for (let inning = 0; inning < INNINGS; inning++) {
      const cell = document.getElementById(`cell-${batter}-${inning}`);
      if (cell) cell.innerHTML = renderDiamond(plays[viewSide][batter][inning], false);
    }
    updateTotalsCell(batter);
  }
}

function updateViewSideUI() {
  const awayBtn = document.getElementById('view-away-btn');
  const homeBtn = document.getElementById('view-home-btn');
  const viewInfo = document.getElementById('view-info');
  if (awayBtn) {
    awayBtn.textContent = meta.awayName || 'Away';
    awayBtn.classList.toggle('is-viewing', viewSide === 'away');
    awayBtn.classList.toggle('is-batting', currentSide === 'away');
    awayBtn.setAttribute('aria-pressed', viewSide === 'away' ? 'true' : 'false');
  }
  if (homeBtn) {
    homeBtn.textContent = meta.homeName || 'Home';
    homeBtn.classList.toggle('is-viewing', viewSide === 'home');
    homeBtn.classList.toggle('is-batting', currentSide === 'home');
    homeBtn.setAttribute('aria-pressed', viewSide === 'home' ? 'true' : 'false');
  }
  if (viewInfo) {
    const viewedName = viewSide === 'away' ? (meta.awayName || 'Away') : (meta.homeName || 'Home');
    const activeName = currentSide === 'away' ? (meta.awayName || 'Away') : (meta.homeName || 'Home');
    viewInfo.textContent = viewSide === currentSide
      ? `Viewing live ${viewedName} book`
      : `Viewing ${viewedName} book · ${activeName} batting`;
  }
}

function setViewSide(side) {
  if (side !== 'away' && side !== 'home') return;
  viewSide = side;
  saveSession();
  renderAll();
}

function updateLinescore() {
  updateMetaLabels();
  for (let inning = 0; inning < INNINGS; inning++) {
    const awayVal = ls.away.inn[inning];
    const homeVal = ls.home.inn[inning];
    document.getElementById(`ls-a${inning + 1}`).textContent = awayVal === null ? '·' : awayVal;
    document.getElementById(`ls-h${inning + 1}`).textContent = homeVal === null ? '·' : homeVal;
  }
  document.getElementById('ls-aR').textContent = ls.away.r;
  document.getElementById('ls-aH').textContent = ls.away.h;
  document.getElementById('ls-aE').textContent = ls.away.e;
  document.getElementById('ls-hR').textContent = ls.home.r;
  document.getElementById('ls-hH').textContent = ls.home.h;
  document.getElementById('ls-hE').textContent = ls.home.e;
}

function refreshActive() {
  renderVisibleScorecard();
  updateViewSideUI();
  document.querySelectorAll('.sk-diamond-cell').forEach((cell) => cell.classList.remove('active-cell'));
  document.querySelectorAll('.sk-lineup-cell').forEach((cell) => cell.classList.remove('active-batter'));
  const activeBatter = getCurrentBatter();
  if (viewSide === currentSide) {
    const activeCell = document.getElementById(`cell-${activeBatter}-${curInning}`);
    if (activeCell) {
      activeCell.classList.add('active-cell');
      if (!plays[currentSide][activeBatter][curInning]) activeCell.innerHTML = renderDiamond(null, true);
      activeCell.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
    }
    const lineupCell = document.getElementById(`lc-${activeBatter}`);
    if (lineupCell) lineupCell.classList.add('active-batter');
  }
  [1,2,3].forEach((index) => {
    document.getElementById(`op${index}`).classList.toggle('filled', index <= outsThisHalf);
  });
  document.getElementById('batter-info').textContent = `${currentSide === 'away' ? '↑' : '↓'} ${currentSide === 'away' ? meta.awayName : meta.homeName} · ${NAMES[activeBatter]}`;
  document.getElementById('inning-info').textContent = `${currentSide === 'away' ? 'Top' : 'Bottom'} ${ordinals[curInning]}`;
}

function renderNotes() {
  const feed = document.getElementById('notes-feed');
  feed.innerHTML = notes.length
    ? notes.map((entry) => `
      <div class="sk-note-entry">
        <span class="sk-note-inning">${escapeHtml(entry.label)}</span>
        <span class="sk-note-text ${entry.tone || ''}">${escapeHtml(entry.text)}</span>
      </div>
    `).join('')
    : `
      <div class="sk-note-entry">
        <span class="sk-note-inning">NOTES</span>
        <span class="sk-note-text">No notes yet. Log the feel of the game as it happens.</span>
      </div>
    `;
  feed.scrollTop = feed.scrollHeight;
}

function renderAll() {
  updateLinescore();
  renderNotes();
  refreshActive();
}

function logPlay(code, count) {
  if (!code.trim()) return;
  pushUndo();
  const side = currentSide;
  const batter = getCurrentBatter();
  const out = isOut(code);
  const hit = isHit(code);
  const err = isErr(code);
  const reach = REACH_CODES.has(code);
  if (out) outsThisHalf++;
  const isLastOut = outsThisHalf >= 3;

  plays[side][batter][curInning] = { code, count, outNum: out ? outsThisHalf : null, isLastOut };

  if (!(code === 'BB' || code === 'HBP')) totals[side][batter].ab++;
  if (hit) {
    totals[side][batter].h++;
    ls[side].h++;
  }
  if (err) ls[side].e++;
  if (code === 'HR') {
    ls[side].r++;
    ls[side].inn[curInning] = (ls[side].inn[curInning] || 0) + 1;
  } else if (reach && ls[side].inn[curInning] === null) {
    ls[side].inn[curInning] = 0;
  }

  batterIndex[side] = (batter + 1) % BATTERS;
  if (isLastOut) {
    outsThisHalf = 0;
    currentSide = side === 'away' ? 'home' : 'away';
    if (currentSide === 'away') curInning = Math.min(curInning + 1, INNINGS - 1);
  }

  renderAll();
  saveSession();
  document.getElementById('play-code').value = '';
  document.getElementById('play-count').value = '';
  document.querySelectorAll('.sk-chip').forEach((chip) => chip.classList.remove('selected'));
}

function addNote(text) {
  if (!text.trim()) return;
  pushUndo();
  const isKey = text.toUpperCase() === text && text.length < 40;
  notes.push({
    label: `${currentSide === 'away' ? 'TOP' : 'BOT'} ${curInning + 1}`,
    text,
    tone: isKey ? 'gold' : ''
  });
  renderNotes();
  saveSession();
}

function runSetup() {
  const nextTitle = window.prompt('Game title', meta.title || 'New Game');
  if (nextTitle === null) return;
  const nextAway = window.prompt('Away team name', meta.awayName || 'Away');
  if (nextAway === null) return;
  const nextHome = window.prompt('Home team name', meta.homeName || 'Home');
  if (nextHome === null) return;
  const nextVenue = window.prompt('Venue', meta.venue || '');
  if (nextVenue === null) return;
  meta.title = nextTitle.trim() || 'New Game';
  meta.awayName = nextAway.trim() || 'Away';
  meta.homeName = nextHome.trim() || 'Home';
  meta.venue = nextVenue.trim();
  renderAll();
  saveSession();
}

function exportSession() {
  const payload = captureSession();
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${(meta.title || 'ballparks-quest-scorebook').toLowerCase().replace(/[^a-z0-9]+/g, '-')}.json`;
  link.click();
  URL.revokeObjectURL(url);
}

function buildFinalScoreLine() {
  return `Final: ${meta.awayName || 'Away'} ${ls.away.r}, ${meta.homeName || 'Home'} ${ls.home.r}`;
}

function buildVisitNotes() {
  const lines = [buildFinalScoreLine()];
  if (meta.venue) lines.push(`Venue: ${meta.venue}`);
  notes.forEach((entry) => {
    const label = entry && entry.label ? `[${entry.label}] ` : '';
    const text = entry && entry.text ? entry.text.trim() : '';
    if (text) lines.push(`${label}${text}`);
  });
  return lines.join('\n');
}

function deriveBestFeature() {
  const standout = notes.find((entry) => entry && entry.tone === 'gold' && entry.text && entry.text.trim());
  if (standout) return standout.text.trim();
  const firstNote = notes.find((entry) => entry && entry.text && entry.text.trim());
  if (firstNote) return firstNote.text.trim();
  return buildFinalScoreLine();
}

function finalizeGame() {
  if (!app || !app.markVisited || !app.updateActiveTrip) return;
  if (!meta.parkId) {
    window.alert('Pick a park before you finish this game.');
    return;
  }

  const confirmation = window.confirm(
    `Finish this game?\n\n${buildFinalScoreLine()}\n${meta.venue ? `${meta.venue}\n` : ''}This saves it to your visited history.`
  );
  if (!confirmation) return;

  pushUndo();

  app.markVisited(meta.parkId, {
    visitDate: new Date().toISOString().slice(0, 10),
    bestFeature: deriveBestFeature(),
    notes: buildVisitNotes()
  });

  app.updateActiveTrip((currentTrip) => {
    currentTrip.legs = (currentTrip.legs || []).map((leg) => {
      if (leg.toParkId !== meta.parkId) return leg;
      return {
        ...leg,
        status: 'completed',
        updatedAt: new Date().toISOString()
      };
    });
    return currentTrip;
  });

  if (window.BPQ && window.BPQ.storage && window.BPQ.storage.flush) {
    window.BPQ.storage.flush();
  }

  localStorage.removeItem(SESSION_KEY);
  if (app.clearScorekeeperContext) app.clearScorekeeperContext();
  window.location.href = 'index.html';
}

function undoLastAction() {
  const snapshot = undoStack.pop();
  if (!snapshot) return;
  restoreSession(snapshot);
  saveSession();
}

document.querySelectorAll('.sk-chip').forEach((chip) => {
  chip.addEventListener('click', () => {
    const code = chip.dataset.code;
    document.getElementById('play-code').value = code;
    document.querySelectorAll('.sk-chip').forEach((item) => item.classList.remove('selected'));
    chip.classList.add('selected');
  });
});

document.getElementById('log-btn').addEventListener('click', () => {
  logPlay(
    document.getElementById('play-code').value.trim(),
    document.getElementById('play-count').value.trim()
  );
});

document.getElementById('play-code').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') document.getElementById('log-btn').click();
});

document.addEventListener('keydown', (event) => {
  if ((event.metaKey || event.ctrlKey) && event.key === 'z') {
    event.preventDefault();
    undoLastAction();
  }
});

document.getElementById('btn-notes-toggle').addEventListener('click', () => {
  document.getElementById('notes-panel').classList.toggle('open');
});

document.getElementById('note-add-btn').addEventListener('click', () => {
  const input = document.getElementById('note-input');
  addNote(input.value);
  input.value = '';
});

document.getElementById('note-input').addEventListener('keydown', (event) => {
  if (event.key === 'Enter') {
    addNote(event.target.value);
    event.target.value = '';
  }
});

document.getElementById('btn-undo').addEventListener('click', undoLastAction);
document.getElementById('btn-export').addEventListener('click', exportSession);
document.getElementById('btn-finish').addEventListener('click', finalizeGame);
document.getElementById('btn-setup').addEventListener('click', runSetup);
document.getElementById('view-away-btn').addEventListener('click', () => setViewSide('away'));
document.getElementById('view-home-btn').addEventListener('click', () => setViewSide('home'));

document.addEventListener('penDetected', () => {
  console.log('[BPQ] Pen detected — ink overlay ready for Phase 2');
});

window.render_game_to_text = function renderGameToText() {
  return JSON.stringify({
    title: meta.title,
    venue: meta.venue,
    currentSide,
    viewSide,
    inning: curInning + 1,
    outs: outsThisHalf,
    batter: getCurrentBatter() + 1,
    away: { name: meta.awayName, r: ls.away.r, h: ls.away.h, e: ls.away.e },
    home: { name: meta.homeName, r: ls.home.r, h: ls.home.h, e: ls.home.e },
    notes: notes.length
  });
};

window.advanceTime = function advanceTime() {
  return null;
};

buildGrid();
loadSession();
updateViewSideUI();
renderAll();
</script>
</body>
</html>
