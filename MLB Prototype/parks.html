<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Ballparks Quest · All 30 Parks</title>
<link rel="stylesheet" href="shared.css">
<style>
/* ═══ PARKS PAGE ════════════════════════════ */

.parks-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  padding-top: 32px;
  padding-bottom: 64px;
  align-items: start;
}

.parks-main { min-width: 0; }

.parks-hero {
  padding: 40px 0 28px;
  border-bottom: 1px solid var(--border-light);
  margin-bottom: 24px;
}

.parks-headline {
  font-family: var(--font-display);
  font-size: clamp(28px, 4vw, 44px);
  font-weight: 900;
  letter-spacing: -0.02em;
  color: var(--navy);
  line-height: 1.1;
  margin-bottom: 6px;
}

/* ─── Filter strip ──────────────────────── */
.filter-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  margin-bottom: 20px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border-light);
}

.filter-search {
  flex: 1;
  min-width: 180px;
  background: var(--surface-card);
  border: 1px solid var(--border-light);
  border-radius: var(--r-md);
  padding: 8px 14px;
  font-family: var(--font-data);
  font-size: 11px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 140ms;
}

.filter-search:focus { border-color: var(--border-mid); }
.filter-search::placeholder { color: var(--text-muted); }

.filter-chip {
  padding: 6px 12px;
  border-radius: 20px;
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: 1px solid var(--border-light);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 120ms;
}

.filter-chip:hover { color: var(--text-primary); border-color: var(--border-mid); }
.filter-chip.active { background: var(--navy); color: var(--cream); border-color: var(--navy); }

/* ─── Park list ─────────────────────────── */
.park-count {
  font-family: var(--font-data);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.parks-list { display: flex; flex-direction: column; gap: 6px; }

.park-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--surface-card);
  border: 1px solid var(--border-light);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 140ms;
  border-left: 3px solid transparent;
}

.park-row:hover {
  border-left-color: var(--border-mid);
  box-shadow: 0 2px 8px rgba(15,31,56,0.06);
}

.park-row.selected {
  border-left-color: var(--red);
  background: rgba(200,48,42,0.04);
}

.park-row-name {
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  flex: 1;
  letter-spacing: -0.01em;
}

.park-row-team {
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  white-space: nowrap;
}

.park-row-city {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ─── Detail panel ──────────────────────── */
.detail-panel {
  position: sticky;
  top: 72px;
  background: var(--navy);
  border-radius: var(--r-xl);
  overflow: hidden;
  color: var(--cream);
}

.detail-stripe { height: 5px; background: var(--red); }

.detail-body { padding: 24px; }

.detail-park-name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--cream);
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.detail-team {
  font-family: var(--font-data);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: rgba(200,168,100,0.6);
  margin-bottom: 16px;
}

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--r-sm);
  overflow: hidden;
  margin-bottom: 16px;
}

.detail-datum {
  padding: 10px 12px;
  background: rgba(255,255,255,0.03);
}

.detail-datum-label {
  font-family: var(--font-data);
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.45);
  margin-bottom: 3px;
}

.detail-datum-value {
  font-family: var(--font-data);
  font-size: 13px;
  font-weight: 500;
  color: var(--cream);
  letter-spacing: 0.04em;
}

.detail-note {
  font-family: var(--font-body);
  font-size: 13px;
  font-style: italic;
  font-weight: 300;
  color: rgba(245,237,216,0.65);
  line-height: 1.55;
  border-left: 2px solid rgba(200,168,100,0.25);
  padding-left: 10px;
  margin-bottom: 20px;
}

.detail-signals {
  display: grid;
  gap: 10px;
  margin-bottom: 18px;
}

.detail-signal {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r-md);
  padding: 10px 12px;
}

.detail-signal-label {
  font-family: var(--font-data);
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.45);
  margin-bottom: 5px;
}

.detail-signal-text {
  font-family: var(--font-body);
  font-size: 13px;
  color: rgba(245,237,216,0.82);
  line-height: 1.5;
}

.detail-event-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.detail-event-pill {
  display: inline-flex;
  align-items: center;
  padding: 4px 8px;
  border-radius: 999px;
  background: rgba(200,168,100,0.1);
  border: 1px solid rgba(200,168,100,0.16);
  font-family: var(--font-data);
  font-size: 9px;
  letter-spacing: 0.08em;
  color: var(--cream);
}

.detail-scratch-label {
  display: block;
  font-family: var(--font-data);
  font-size: 8px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(200,168,100,0.45);
  margin-bottom: 8px;
}

.detail-scratchpad {
  width: 100%;
  min-height: 124px;
  resize: vertical;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--r-md);
  color: var(--cream);
  font-family: var(--font-body);
  font-size: 13px;
  line-height: 1.55;
  padding: 12px;
  outline: none;
  margin-bottom: 18px;
}

.detail-scratchpad:focus {
  border-color: rgba(200,168,100,0.34);
  box-shadow: 0 0 0 3px rgba(200,168,100,0.08);
}

.detail-scratchpad::placeholder { color: rgba(245,237,216,0.3); }

.detail-actions {
  display: flex;
  gap: 8px;
  flex-direction: column;
}

@media (max-width: 900px) {
  .parks-layout { grid-template-columns: 1fr; }
  .detail-panel { position: static; }
}
</style>
</head>
<body>
<script src="storage.js"></script>
<script src="utils.js"></script>
<script src="data.js"></script>
<script src="device.js"></script>
<script src="app.js"></script>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">
    <span class="nav-brand-name">Ballparks Quest</span>
    <span class="nav-brand-mark">MLB · 30 Parks</span>
  </a>
  <div class="nav-links">
    <a href="index.html"       class="nav-link">Home</a>
    <a href="parks.html"       class="nav-link active">Parks</a>
    <a href="route.html"       class="nav-link">Route</a>
    <a href="scorekeeper.html" class="nav-link nav-cta">⬥ Scorekeeper</a>
  </div>
</nav>

<div class="page-wrap">
<div class="parks-layout">

  <!-- Left: park list -->
  <div class="parks-main">
    <div class="parks-hero fade-up">
      <div class="section-label">Park directory</div>
      <h1 class="parks-headline">All 30 parks.<br>Filter and find.</h1>
    </div>

    <div class="filter-strip fade-up fade-up-1">
      <input class="filter-search" id="park-search" placeholder="Search parks, cities, teams…">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="visited">Visited</button>
      <button class="filter-chip" data-filter="unvisited">Not visited</button>
      <button class="filter-chip" data-filter="open">Open air</button>
      <button class="filter-chip" data-filter="retractable">Retractable</button>
    </div>

    <div class="park-count fade-up fade-up-2" id="park-count">30 parks</div>

    <div class="parks-list fade-up fade-up-2" id="parks-list">
      <!-- JS populated -->
    </div>
  </div>

  <!-- Right: detail panel -->
  <div>
    <div class="detail-panel fade-up fade-up-3" id="detail-panel">
      <div class="detail-stripe" id="detail-stripe"></div>
      <div class="detail-body">
        <div class="detail-park-name" id="d-name">Select a park</div>
        <div class="detail-team" id="d-team">Click any row to inspect</div>
        <div class="detail-grid" id="d-grid"></div>
        <div class="detail-note" id="d-note">Park details will appear here.</div>
        <div class="detail-signals" id="d-signals"></div>
        <label class="detail-scratch-label" for="d-scratchpad">Research scratchpad</label>
        <textarea class="detail-scratchpad" id="d-scratchpad" placeholder="Keep quick scouting notes, date windows, transit warnings, or anything you want in reach while comparing parks."></textarea>
        <div class="detail-actions">
          <button type="button" class="btn btn-ghost" style="justify-content:center;" id="d-visit-toggle">Mark as visited</button>
          <button type="button" class="btn btn-ghost" style="justify-content:center;" id="d-route-toggle">Add to route</button>
          <a href="scorekeeper.html" class="btn btn-red" style="justify-content:center;" id="d-score-link">Score a game here</a>
        </div>
      </div>
    </div>
  </div>

</div>
</div>

<script>
(function() {
  const app = window.BPQ && window.BPQ.app;
  if (!app) return;

  let selectedParkId = null;
  let activeFilter = 'all';
  let searchTerm = '';

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getFilteredParks() {
    return app.getParks().filter((park) => {
      const q = searchTerm.toLowerCase();
      const matchSearch = !q ||
        park.name.toLowerCase().includes(q) ||
        park.team.toLowerCase().includes(q) ||
        park.city.toLowerCase().includes(q);
      const matchFilter =
        activeFilter === 'all' ? true :
        activeFilter === 'visited' ? app.isVisited(park.id) :
        activeFilter === 'unvisited' ? !app.isVisited(park.id) :
        activeFilter === 'open' ? park.roof === 'Open' :
        activeFilter === 'retractable' ? park.roof === 'Retractable' : true;
      return matchSearch && matchFilter;
    });
  }

  function updateDetailActions(park) {
    const visitButton = document.getElementById('d-visit-toggle');
    const routeButton = document.getElementById('d-route-toggle');
    const scoreLink = document.getElementById('d-score-link');
    const routeIds = app.getRouteStore().stops;
    const visited = app.isVisited(park.id);
    const onRoute = routeIds.includes(park.id);

    visitButton.textContent = visited ? 'Remove visited mark' : 'Mark as visited';
    routeButton.textContent = onRoute ? 'Remove from route' : 'Add to route';
    scoreLink.href = 'scorekeeper.html';
    scoreLink.dataset.parkId = park.id;
  }

  function renderList() {
    const list = document.getElementById('parks-list');
    const count = document.getElementById('park-count');
    const filtered = getFilteredParks();
    count.textContent = `${filtered.length} park${filtered.length !== 1 ? 's' : ''}`;
    list.innerHTML = filtered.map((park) => `
      <div class="park-row ${selectedParkId === park.id ? 'selected' : ''}" data-park-id="${park.id}" tabindex="0" role="button" aria-pressed="${selectedParkId === park.id ? 'true' : 'false'}">
        <div class="tier-stamp tier-${park.tier}">${park.tier}</div>
        <div class="park-row-name">${park.name}</div>
        <div class="park-row-city">${park.city}</div>
        ${app.isVisited(park.id) ? '<span class="badge badge-visited">✓</span>' : '<span class="badge badge-unvisited">Open</span>'}
      </div>
    `).join('');
  }

  function selectPark(id) {
    const park = app.getParkById(id);
    if (!park) return;
    selectedParkId = park.id;
    const visitMeta = app.getVisitedMeta(park.id);
    const parkScratchpad = app.getParkScratchpad(park.id);
    const specialEvents = Array.isArray(park.specialEvents) && park.specialEvents.length ? park.specialEvents : ['No current event signal'];
    document.getElementById('detail-stripe').style.background = park.color;
    document.getElementById('d-name').textContent = park.name;
    document.getElementById('d-team').textContent = `${park.team} · ${park.city}`;
    document.getElementById('d-note').textContent = visitMeta && visitMeta.notes ? visitMeta.notes : (park.note || '');
    document.getElementById('d-grid').innerHTML = `
      <div class="detail-datum"><div class="detail-datum-label">Opened</div><div class="detail-datum-value">${park.opened}</div></div>
      <div class="detail-datum"><div class="detail-datum-label">Capacity</div><div class="detail-datum-value">${park.capacity.toLocaleString()}</div></div>
      <div class="detail-datum"><div class="detail-datum-label">Roof</div><div class="detail-datum-value">${park.roof}</div></div>
      <div class="detail-datum"><div class="detail-datum-label">Priority</div><div class="detail-datum-value">Tier ${park.tier}</div></div>
      <div class="detail-datum"><div class="detail-datum-label">Visited</div><div class="detail-datum-value">${visitMeta ? visitMeta.visitDate || 'Marked' : 'Not yet'}</div></div>
      <div class="detail-datum"><div class="detail-datum-label">Standout</div><div class="detail-datum-value">${visitMeta?.bestFeature || 'Still scouting'}</div></div>
    `;
    document.getElementById('d-signals').innerHTML = `
      <div class="detail-signal">
        <div class="detail-signal-label">Ticket approach</div>
        <div class="detail-signal-text">${escapeHtml(park.ticketApproach)}</div>
      </div>
      <div class="detail-signal">
        <div class="detail-signal-label">Transit note</div>
        <div class="detail-signal-text">${escapeHtml(park.transitNote)}</div>
      </div>
      <div class="detail-signal">
        <div class="detail-signal-label">Special events</div>
        <div class="detail-event-list">
          ${specialEvents.map((eventName) => `<span class="detail-event-pill">${escapeHtml(eventName)}</span>`).join('')}
        </div>
      </div>
    `;
    document.getElementById('d-scratchpad').value = parkScratchpad ? parkScratchpad.text : '';
    updateDetailActions(park);
    renderList();
  }

  document.getElementById('park-search').addEventListener('input', (event) => {
    searchTerm = event.target.value;
    renderList();
  });

  document.querySelectorAll('.filter-chip').forEach((chip) => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.filter-chip').forEach((node) => node.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter;
      renderList();
    });
  });

  document.getElementById('parks-list').addEventListener('click', (event) => {
    const row = event.target.closest('[data-park-id]');
    if (!row) return;
    selectPark(row.dataset.parkId);
  });

  document.getElementById('parks-list').addEventListener('keydown', (event) => {
    const row = event.target.closest('[data-park-id]');
    if (!row) return;
    if (event.key === 'Enter' || event.key === ' ') {
      event.preventDefault();
      selectPark(row.dataset.parkId);
    }
  });

  document.getElementById('d-visit-toggle').addEventListener('click', () => {
    if (!selectedParkId) return;
    const park = app.getParkById(selectedParkId);
    const nowVisited = app.toggleVisited(selectedParkId, { bestFeature: park.tier === 'S' ? 'Must-see atmosphere' : 'Route stop', notes: park.note });
    if (nowVisited) app.addRouteStop(selectedParkId);
    selectPark(selectedParkId);
  });

  document.getElementById('d-route-toggle').addEventListener('click', () => {
    if (!selectedParkId) return;
    const onRoute = app.getRouteStore().stops.includes(selectedParkId);
    if (onRoute) app.removeRouteStop(selectedParkId);
    else app.addRouteStop(selectedParkId);
    selectPark(selectedParkId);
  });

  document.getElementById('d-score-link').addEventListener('click', () => {
    if (!selectedParkId) return;
    app.setScorekeeperContext(selectedParkId);
  });

  document.getElementById('d-scratchpad').addEventListener('input', (event) => {
    if (!selectedParkId) return;
    app.saveParkScratchpad(selectedParkId, event.target.value);
  });

  renderList();
  const preferred = app.getRouteStore().stops[0] || app.getNextTargets(1)[0]?.id || app.getParks()[0]?.id;
  if (preferred) selectPark(preferred);
})();
</script>
</body>
</html>
